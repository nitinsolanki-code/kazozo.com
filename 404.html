<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg:#0C0B12; --surface:#13121D; --card:#1A192A; --coral:#FF6B5A; --lime:#CDFF64; --text:#F0EFF4; --muted:#7D7A8C; --border:rgba(255,255,255,0.06); }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px; }
  .logo { font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:700; color:var(--text); text-decoration:none; margin-bottom:60px; }
  .logo span { color:var(--coral); }
  .code { font-family:'Space Grotesk',sans-serif; font-size:120px; font-weight:700; color:var(--coral); line-height:1; opacity:0.3; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(28px,4vw,42px); font-weight:800; margin:16px 0; letter-spacing:-1px; }
  p { color:var(--muted); font-size:16px; line-height:1.6; max-width:480px; margin:0 auto 32px; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:14px 32px; background:var(--coral); color:#fff; border-radius:12px; text-decoration:none; font-weight:600; font-size:15px; transition:all 0.3s; }
  .btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,107,90,0.3); }

  /* MOBILE FIRST FIXES */
  img, iframe, video, embed, object, svg { max-width: 100%; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }

  @media(max-width:600px) {
    nav { padding:8px 12px; }
    .nav-inner { padding:10px 16px; border-radius:12px; }
    .logo { font-size:20px; }
    .hero { padding:100px 16px 40px; }
    .hero h1 { font-size:clamp(24px,7vw,36px); letter-spacing:-1px; }
    .hero p { font-size:15px; }
    .section { padding:0 16px 60px; }
    .section h2 { font-size:clamp(20px,5vw,28px); }
    .pkg { padding:20px 16px; }
    .pkg-name { font-size:16px; }
    .pkg-price { font-size:22px; }
    .cta-btn { width:100%; justify-content:center; padding:14px 24px; font-size:15px; }
    footer { padding:32px 16px; }
    .footer-nav { flex-direction:column; gap:24px; }
    .scroll-top { bottom:140px; right:16px; }
  }
  @media(max-width:380px) {
    .hero h1 { font-size:22px; }
    .nav-inner { padding:8px 12px; }
    .logo { font-size:18px; }
  }
